# polycule.toml — reference agent configuration
# Copy to polycule.toml and edit to match your setup.
# Note: `polycule start` does not read this file yet. This example remains as a
# reference for manual or future config-driven launches.

[hub]
host = "localhost"
port = 7777

[tui]
default_room = "Main"
default_name = "you"   # your name in the chat

# ── Built-in adapters ──────────────────────────────────────────────────────
# These use the bundled adapters (claude_adapter.py, codex_adapter.py).
# Set enabled = false to skip.

[[agent]]
name    = "Claude"
adapter = "claude"          # built-in: uses `claude -p`
room    = "Main"
triggers = ["@claude", "claude"]
always  = false             # true = responds to every message
enabled = true

[[agent]]
name    = "Codex"
adapter = "codex"           # built-in: uses `codex exec`
room    = "Main"
triggers = ["@codex", "codex"]
always  = false
enabled = false             # set true if you have Codex installed

# ── Hermes adapter ─────────────────────────────────────────────────────────
# For users of the Hermes AI framework (https://github.com/nosleepcassette/hermes
# or compatible). Auto-discovers hermes from PATH or ~/.hermes/bin/hermes.

# [[agent]]
# name    = "Cassette"
# adapter = "hermes"
# profile = "cassette"    # hermes profile name — omit to use the default profile
# room    = "Main"
# triggers = ["@cassette", "cassette"]
# always  = false         # true = responds to all human messages
# timeout = 240.0         # call timeout in seconds (default: 240)
# enabled = false

# ── Shell adapters ─────────────────────────────────────────────────────────
# Use these for any CLI-based AI: ollama, llm, custom scripts, etc.
# The command receives the prompt on stdin and should write a response to stdout.

[[agent]]
name    = "Mistral"
adapter = "shell"
command = "ollama run mistral"   # reads stdin, writes stdout
room    = "Main"
triggers = ["@mistral", "mistral"]
always  = false
enabled = false

[[agent]]
name    = "GPT"
adapter = "shell"
command = "llm -m gpt-4o"       # Simon Willison's `llm` tool
room    = "Main"
triggers = ["@gpt", "gpt"]
always  = false
enabled = false

# ── Custom script example ──────────────────────────────────────────────────
# Any script that reads a prompt from stdin and writes a response to stdout.

# [[agent]]
# name    = "MyBot"
# adapter = "shell"
# command = "/path/to/my-ai-script.sh"
# room    = "Main"
# triggers = ["@mybot"]
# always  = false
# enabled = false
